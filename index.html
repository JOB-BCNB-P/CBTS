<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบติดตามการใช้จ่ายงบประมาณค่าสอน</title>

  <!-- Tailwind (Play CDN) -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a5f',
            secondary: '#4a90d9',
            accent: '#f39c12',
            surface: '#f8fafc',
            danger: '#e74c3c'
          }
        }
      }
    };
  </script>

  <!-- ไอคอน + ฟอนต์ + กราฟ -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- สไตล์ของเราเอง -->
  <link rel="stylesheet" href="styles.css">
</head>

<body class="h-full bg-surface text-gray-800 overflow-hidden">
  <div id="app" class="h-full w-full flex flex-col">

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-[9999] flex flex-col gap-2"></div>

    <!-- Login Page -->
    <div id="login-page" class="h-full w-full flex items-center justify-center bg-gradient-to-br from-primary to-secondary">
      <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4 fade-in">
        <div class="text-center mb-8">
          <div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mx-auto mb-4">
            <i data-lucide="graduation-cap" class="text-white" style="width:32px;height:32px"></i>
          </div>
          <h1 class="text-2xl font-bold text-primary" id="login-title">ระบบติดตามการใช้จ่ายงบประมาณค่าสอน</h1>
          <p class="text-gray-500 mt-2">กรุณาเข้าสู่ระบบ</p>
        </div>
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="mb-4">
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">ชื่อผู้ใช้</label>
            <input type="text" id="username" autocomplete="username"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent outline-none"
                   placeholder="กรอกชื่อผู้ใช้" required>
          </div>
          <div class="mb-6">
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">รหัสผ่าน</label>
            <input type="password" id="password" autocomplete="current-password"
                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent outline-none"
                   placeholder="กรอกรหัสผ่าน" required>
          </div>
          <div id="login-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm"></div>
          <button type="submit" id="login-btn"
                  class="w-full bg-primary hover:bg-blue-900 text-white font-semibold py-3 rounded-lg transition-colors disabled:opacity-60">
            เข้าสู่ระบบ
          </button>
        </form>
        <div class="mt-6 p-4 bg-gray-50 rounded-lg text-xs text-gray-500">
          <p class="font-semibold mb-1">บัญชีเริ่มต้น (หลังกด init):</p>
          <p>Admin: admin / admin123</p>
          <p class="mt-1 text-gray-400">บัญชีอื่น ๆ สร้างได้ที่เมนู “จัดการผู้ใช้”</p>
        </div>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="hidden h-full w-full flex flex-col">
      <!-- Top Bar -->
      <header class="bg-primary text-white px-4 py-3 flex items-center justify-between shadow-lg no-print z-50">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar()" class="p-2 hover:bg-white/10 rounded-lg transition-colors">
            <i data-lucide="menu" style="width:20px;height:20px"></i>
          </button>
          <h1 class="text-lg font-semibold hidden sm:block" id="app-title">ระบบติดตามการใช้จ่ายงบประมาณค่าสอน</h1>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-sm bg-white/10 px-3 py-1 rounded-full" id="user-info"></span>
          <button onclick="handleLogout()" class="p-2 hover:bg-white/10 rounded-lg transition-colors" title="ออกจากระบบ">
            <i data-lucide="log-out" style="width:18px;height:18px"></i>
          </button>
        </div>
      </header>

      <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar-transition bg-white border-r border-gray-200 w-64 flex-shrink-0 overflow-y-auto no-print z-40">
          <div class="p-4 space-y-1" id="nav-menu"></div>
        </nav>
        <!-- Main Content -->
        <main id="main-content" class="flex-1 overflow-y-auto p-4 md:p-6"></main>
      </div>
    </div>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-white/70 z-[9998] flex items-center justify-center">
      <div class="flex flex-col items-center gap-3">
        <div class="w-10 h-10 border-4 border-gray-200 border-t-secondary rounded-full animate-spin"></div>
        <p class="text-sm text-gray-500">กำลังโหลดข้อมูล...</p>
      </div>
    </div>

  </div>

  <!-- โค้ดหลักของแอป -->
  <script src="app.js"></script>
</body>
</html>
